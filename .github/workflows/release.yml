name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (no-bump rebuilds and replaces assets on the existing tag)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - no-bump

jobs:
  # ── 1. Bump version (skipped for no-bump), commit, and push/ensure tag ───
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.calc.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version and update files
        id: calc
        run: |
          CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUMP="${{ github.event.inputs.bump }}"

          if [ "$BUMP" = "no-bump" ]; then
            echo "No bump — keeping version $CURRENT"
            echo "new_version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Bumping $CURRENT → $NEW_VERSION"

            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              conf.version = '$NEW_VERSION';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            "
            sed -i "s/^version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit, tag, and push
        run: |
          BUMP="${{ github.event.inputs.bump }}"
          TAG="v${{ steps.calc.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BUMP" != "no-bump" ]; then
            # New version: commit files, tag, push branch + tag together
            git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to ${{ steps.calc.outputs.new_version }}"
            git tag "$TAG"
            git push origin HEAD:${{ github.ref_name }} --follow-tags
          else
            # No bump: ensure the tag exists (create it if missing, otherwise reuse)
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
              echo "Tag $TAG already exists — will replace assets on existing release"
            else
              echo "Tag $TAG not found — creating it at current HEAD"
              git tag "$TAG"
              git push origin "$TAG"
            fi
          fi

  # ── 2. Build on each platform ─────────────────────────────────────────────
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-22.04
            label: Linux
          - os: windows-latest
            label: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build — macOS (universal binary)
        if: matrix.os == 'macos-latest'
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Build — Linux / Windows
        if: matrix.os != 'macos-latest'
        run: npm run tauri build

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 1

      - name: Upload Linux packages
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 1

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ── 3. Publish or update the GitHub Release ───────────────────────────────
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish or update release
        run: |
          TAG="v${{ needs.version.outputs.new_version }}"
          VERSION="${{ needs.version.outputs.new_version }}"

          mapfile -t FILES < <(find artifacts -type f | sort)

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — replacing binary assets"
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            echo "Creating release $TAG"
            cat > release_notes.md << NOTES
          ## Sequelit v${VERSION}

          ### Download

          | Platform | File | Notes |
          |---|---|---|
          | **macOS** | \`.dmg\` | Universal binary — Apple Silicon + Intel |
          | **Ubuntu / Debian** | \`.deb\` | \`sudo dpkg -i sequelit_*.deb\` |
          | **Linux (generic)** | \`.AppImage\` | \`chmod +x sequelit_*.AppImage && ./sequelit_*.AppImage\` |
          | **Windows** | \`.msi\` | MSI installer |
          | **Windows (alt)** | \`.exe\` | NSIS installer |

          ### Requirements
          - macOS 12+
          - Ubuntu 22.04+ / Debian 12+
          - Windows 10+
          NOTES
            gh release create "$TAG" \
              --title "Sequelit v${VERSION}" \
              --notes-file release_notes.md \
              "${FILES[@]}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
